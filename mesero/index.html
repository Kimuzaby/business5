<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesero | La Esquina del Sabor</title>
    <link rel="icon" type="image/jpg" href="../img/logo.jpg">
    <style>
        :root {
            --primary: #8B4513;
            --primary-dark: #654321;
            --accent: #DAA520;
            --charcoal: #2C1810;
            --dark: #1A0F0A;
            --card-bg: #3B2314;
            --surface: #4A3520;
            --text: #FFF8F0;
            --text-muted: #C4A882;
            --border: #5C4033;
            --red: #C0392B;
            --radius: 8px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }
        
        .top-bar { background: var(--charcoal); border-bottom: 2px solid var(--accent); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .top-bar h1 { font-size: 1.3rem; color: var(--accent); display: flex; align-items: center; gap: 10px; }
        .top-bar .badge { background: var(--primary); color: #fff; padding: 4px 12px; border-radius: 50px; font-weight: 700; font-size: 0.8rem; }
        
        .mesa-selector { background: var(--card-bg); padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        .mesa-selector label { font-weight: 600; color: var(--accent); }
        .mesa-selector input { padding: 8px 15px; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius); font-size: 1rem; width: 100px; }
        .mesa-selector input:focus { outline: none; border-color: var(--accent); }
        
        .layout { display: flex; height: calc(100vh - 130px); }
        .menu-panel { flex: 1; overflow-y: auto; padding: 20px; }
        .cart-panel { width: 400px; background: var(--card-bg); border-left: 2px solid var(--accent); display: flex; flex-direction: column; }
        .cart-panel h2 { padding: 15px 20px; background: var(--charcoal); color: var(--accent); font-size: 1.1rem; border-bottom: 1px solid var(--border); }
        .cart-items { flex: 1; overflow-y: auto; padding: 15px 20px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .cart-item-info { flex: 1; }
        .cart-item-name { font-weight: 600; font-size: 0.9rem; }
        .cart-item-price { color: var(--accent); font-size: 0.85rem; margin-top: 3px; }
        .cart-item-qty { display: flex; align-items: center; gap: 8px; }
        .cart-item-qty button { width: 28px; height: 28px; border: 1px solid var(--border); background: var(--surface); color: var(--text); border-radius: 4px; cursor: pointer; }
        .cart-item-qty button:hover { background: var(--primary); border-color: var(--primary); }
        .cart-item-qty span { min-width: 25px; text-align: center; font-weight: 700; }
        .cart-footer { padding: 15px 20px; background: var(--charcoal); border-top: 1px solid var(--border); }
        .cart-total { font-size: 1.3rem; font-weight: 700; color: var(--accent); margin-bottom: 12px; display: flex; justify-content: space-between; }
        .btn-send { width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none; border-radius: var(--radius); font-weight: 700; font-size: 1rem; cursor: pointer; }
        .btn-send:hover { background: var(--primary-dark); }
        .btn-clear { width: 100%; padding: 8px; background: transparent; color: #ff5252; border: 1px solid #ff5252; border-radius: var(--radius); margin-bottom: 8px; cursor: pointer; }
        
        .category-tabs { display: flex; overflow-x: auto; gap: 5px; margin-bottom: 20px; }
        .tab-btn { padding: 8px 18px; background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); border-radius: 50px; cursor: pointer; white-space: nowrap; font-size: 0.85rem; font-weight: 600; }
        .tab-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; }
        .product-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 15px; cursor: pointer; transition: all 0.2s; }
        .product-card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .product-card h3 { font-size: 0.95rem; margin-bottom: 5px; }
        .product-card .price { color: var(--accent); font-weight: 700; font-size: 1.1rem; }
        .product-card .desc { color: var(--text-muted); font-size: 0.8rem; margin-top: 5px; }
        
        @media (max-width: 768px) {
            .layout { flex-direction: column; }
            .cart-panel { width: 100%; height: 45vh; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <h1>🍽️ Mesero · La Esquina del Sabor <span class="badge">Panel Interno</span></h1>
    <a href="../index.html" style="color:var(--text-muted);text-decoration:none;">← Web Pública</a>
</div>

<div class="mesa-selector">
    <label>Mesa #:</label>
    <input type="number" id="mesa-numero" value="1" min="1" max="50">
    <label style="margin-left:15px;">Cliente/Nota:</label>
    <input type="text" id="mesa-nombre" placeholder="Ej: Carlos" style="width:180px;">
</div>

<div class="layout">
    <!-- Menú -->
    <div class="menu-panel">
        <div class="category-tabs">
            <button class="tab-btn active" onclick="filterTab('todas', this)">Todas</button>
            <button class="tab-btn" onclick="filterTab('pupusas', this)">Pupusas</button>
            <button class="tab-btn" onclick="filterTab('tortas', this)">Tortas</button>
            <button class="tab-btn" onclick="filterTab('carnes', this)">Carnes</button>
            <button class="tab-btn" onclick="filterTab('mariscos', this)">Mariscos</button>
            <button class="tab-btn" onclick="filterTab('pollo', this)">Pollo</button>
            <button class="tab-btn" onclick="filterTab('bebidas', this)">Bebidas</button>
        </div>
        <div class="menu-grid" id="menu-grid"></div>
    </div>

    <!-- Carrito -->
    <div class="cart-panel">
        <h2>🧾 Pedido Mesa #<span id="cart-mesa-display">1</span> — <span id="cart-cliente-display">Sin nombre</span></h2>
        <div class="cart-items" id="cart-items-mesero">
            <p style="color:var(--text-muted);text-align:center;padding:40px;">Carrito vacío</p>
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cart-total-mesero">$0.00</span>
            </div>
            <button class="btn-clear" onclick="clearCart()">🗑️ Vaciar carrito</button>
            <button class="btn-send" onclick="sendToKitchen()">📤 Enviar a Cocina</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDKmVDbSZcC6JwRG2eJkzPjf42aFVYdWg4",
  authDomain: "hill-n-grill.firebaseapp.com",
  projectId: "hill-n-grill",
  storageBucket: "hill-n-grill.firebasestorage.app",
  messagingSenderId: "409489607164",
  appId: "1:409489607164:web:7ed786bd632b0feb3e4a79"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let cartMesero = [];
let mesaActual = 1;

// Menú completo para mesero
const menuItems = [
    // PUPUSAS
    { id: 'pup-1', name: 'Pupusa Frijol con Queso', price: 0.75, category: 'pupusas', desc: 'Frijoles refritos y queso fresco' },
    { id: 'pup-2', name: 'Pupusa Revuelta', price: 0.85, category: 'pupusas', desc: 'Chicharrón, frijol y queso' },
    { id: 'pup-3', name: 'Pupusa Chicharrón con Queso', price: 0.85, category: 'pupusas', desc: 'Chicharrón molido con queso' },
    { id: 'pup-4', name: 'Pupusa Queso con Loroco', price: 0.90, category: 'pupusas', desc: 'Queso fresco con flor de loroco' },
    { id: 'pup-5', name: 'Pupusa de Queso', price: 0.70, category: 'pupusas', desc: 'Queso fresco derretido' },
    { id: 'pup-6', name: 'Pupusa de Frijol', price: 0.65, category: 'pupusas', desc: 'Frijoles refritos sazonados' },
    { id: 'pup-7', name: 'Orden 4 Pupusas Mixtas', price: 3.00, category: 'pupusas', desc: 'Elige 4 variedades + curtido y salsa' },
    // TORTAS
    { id: 'tor-1', name: 'Torta de Carne', price: 4.50, category: 'tortas', desc: 'Carne asada, aguacate, vegetales' },
    { id: 'tor-2', name: 'Torta de Jamón', price: 3.50, category: 'tortas', desc: 'Jamón, queso amarillo, vegetales' },
    { id: 'tor-3', name: 'Torta Mixta', price: 5.00, category: 'tortas', desc: 'Carne, jamón y queso' },
    { id: 'tor-4', name: 'Torta de Pollo', price: 4.00, category: 'tortas', desc: 'Pollo a la plancha con vegetales' },
    { id: 'tor-5', name: 'Torta Cubana', price: 6.00, category: 'tortas', desc: 'Carne, jamón, salchicha, huevo, queso' },
    // CARNES
    { id: 'car-1', name: 'Carne Asada (8 onz)', price: 7.50, category: 'carnes', desc: 'Chimol, frijoles, arroz, plátano, tortillas' },
    { id: 'car-2', name: 'Carne Asada Especial (12 onz)', price: 10.00, category: 'carnes', desc: 'Aguacate, queso fresco, chimol, arroz' },
    { id: 'car-3', name: 'Bistec Encebollado', price: 7.00, category: 'carnes', desc: 'Cebolla caramelizada, arroz, frijoles' },
    { id: 'car-4', name: 'Parrillada Individual', price: 9.00, category: 'carnes', desc: 'Carne, chorizo, plátano, queso, frijoles' },
    // MARISCOS
    { id: 'mar-1', name: 'Pescado Frito', price: 9.00, category: 'mariscos', desc: 'Con arroz, ensalada y tajadas' },
    { id: 'mar-2', name: 'Cóctel de Camarones', price: 6.50, category: 'mariscos', desc: 'Salsa rosa, aguacate, galletas' },
    { id: 'mar-3', name: 'Ceviche de Camarón', price: 7.00, category: 'mariscos', desc: 'Limón, tomate, cebolla morada' },
    { id: 'mar-4', name: 'Sopa Marinera', price: 8.00, category: 'mariscos', desc: 'Mariscos, verduras, arroz, tortillas' },
    { id: 'mar-5', name: 'Filete Pescado Empanizado', price: 8.50, category: 'mariscos', desc: 'Papas fritas, ensalada, salsa tártara' },
    // POLLO
    { id: 'pol-1', name: 'Pollo Asado c/Arroz y Ensalada', price: 6.00, category: 'pollo', desc: 'Cuarto de pollo al carbón' },
    { id: 'pol-2', name: 'Pollo en Crema de Loroco', price: 7.00, category: 'pollo', desc: 'Arroz, verduras al vapor, papas' },
    { id: 'pol-3', name: 'Pollo a la Plancha', price: 6.50, category: 'pollo', desc: 'Arroz integral, vegetales, ensalada' },
    { id: 'pol-4', name: 'Pollo Guisado', price: 6.00, category: 'pollo', desc: 'Salsa de tomate, papas, zanahoria' },
    // BEBIDAS
    { id: 'beb-1', name: 'Jugo Natural (16 onz)', price: 1.50, category: 'bebidas', desc: 'Naranja, marañón, tamarindo, piña' },
    { id: 'beb-2', name: 'Licuado (20 onz)', price: 2.50, category: 'bebidas', desc: 'Banano, fresa, mango o papaya' },
    { id: 'beb-3', name: 'Refresco de Horchata', price: 1.25, category: 'bebidas', desc: 'Casera con morro y canela' },
    { id: 'beb-4', name: 'Refresco de Cebada', price: 1.25, category: 'bebidas', desc: 'Bebida tradicional' },
    { id: 'beb-5', name: 'Soda', price: 1.00, category: 'bebidas', desc: 'Coca-Cola, Fanta, Sprite' },
    { id: 'beb-6', name: 'Agua Embotellada', price: 0.75, category: 'bebidas', desc: '600 ml' },
    { id: 'beb-7', name: 'Café de Olla', price: 1.00, category: 'bebidas', desc: 'Canela y panela' }
];

function renderMenu(filter = 'todas') {
    const grid = document.getElementById('menu-grid');
    const items = filter === 'todas' ? menuItems : menuItems.filter(i => i.category === filter);
    grid.innerHTML = items.map(item => `
        <div class="product-card" onclick="addToCartMesero('${item.id}', '${item.name.replace(/'/g, "\\'")}', ${item.price})">
            <h3>${item.name}</h3>
            <div class="price">$${item.price.toFixed(2)}</div>
            ${item.desc ? `<div class="desc">${item.desc}</div>` : ''}
        </div>
    `).join('');
}

function filterTab(cat, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderMenu(cat);
}

function addToCartMesero(id, name, price) {
    const existing = cartMesero.find(i => i.id === id);
    if (existing) { existing.quantity += 1; }
    else { cartMesero.push({ id, name, price, quantity: 1 }); }
    renderCart();
}

function updateQtyMesero(id, change) {
    const idx = cartMesero.findIndex(i => i.id === id);
    if (idx > -1) {
        cartMesero[idx].quantity += change;
        if (cartMesero[idx].quantity <= 0) cartMesero.splice(idx, 1);
    }
    renderCart();
}

function clearCart() {
    if (confirm('¿Vaciar el carrito?')) { cartMesero = []; renderCart(); }
}

function renderCart() {
    const container = document.getElementById('cart-items-mesero');
    const totalEl = document.getElementById('cart-total-mesero');
    mesaActual = parseInt(document.getElementById('mesa-numero').value) || 1;
    document.getElementById('cart-mesa-display').textContent = mesaActual;
    document.getElementById('cart-cliente-display').textContent = document.getElementById('mesa-nombre').value || 'Sin nombre';
    
    if (cartMesero.length === 0) {
        container.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:40px;">Carrito vacío</p>';
        totalEl.textContent = '$0.00';
        return;
    }
    
    let total = 0;
    container.innerHTML = cartMesero.map(item => {
        const subtotal = item.price * item.quantity;
        total += subtotal;
        return `
            <div class="cart-item">
                <div class="cart-item-info">
                    <div class="cart-item-name">${item.name}</div>
                    <div class="cart-item-price">$${subtotal.toFixed(2)}</div>
                </div>
                <div class="cart-item-qty">
                    <button onclick="updateQtyMesero('${item.id}', -1)">−</button>
                    <span>${item.quantity}</span>
                    <button onclick="updateQtyMesero('${item.id}', 1)">+</button>
                </div>
            </div>
        `;
    }).join('');
    totalEl.textContent = `$${total.toFixed(2)}`;
}

async function sendToKitchen() {
    if (cartMesero.length === 0) { alert('El carrito está vacío'); return; }
    mesaActual = parseInt(document.getElementById('mesa-numero').value) || 1;
    const nombreCliente = document.getElementById('mesa-nombre').value || 'Sin nombre';
    const total = cartMesero.reduce((s, i) => s + (i.price * i.quantity), 0);
    
    const pedido = {
        mesa: mesaActual,
        cliente: nombreCliente,
        items: cartMesero.map(i => ({ name: i.name, price: i.price, quantity: i.quantity, subtotal: i.price * i.quantity })),
        total: parseFloat(total.toFixed(2)),
        estado: 'pendiente',
        mesero: 'Mesero',
        fecha: firebase.firestore.Timestamp.now(),
        fechaTexto: new Date().toLocaleString()
    };
    
    try {
        await db.collection('pedidos').add(pedido);
        alert('✅ ¡Pedido enviado a cocina!');
        cartMesero = [];
        document.getElementById('mesa-numero').value = '';
        document.getElementById('mesa-nombre').value = '';
        document.getElementById('cart-mesa-display').textContent = '—';
        document.getElementById('cart-cliente-display').textContent = 'Sin nombre';
        renderCart();
    } catch (error) {
        console.error('Error:', error);
        alert('❌ Error al enviar el pedido. Revisa la consola.');
    }
}

// Inicializar
document.getElementById('mesa-numero').addEventListener('input', () => {
    const val = document.getElementById('mesa-numero').value;
    mesaActual = val ? parseInt(val) : null;
    document.getElementById('cart-mesa-display').textContent = val || '—';
});
document.getElementById('mesa-nombre').addEventListener('input', () => {
    document.getElementById('cart-cliente-display').textContent = document.getElementById('mesa-nombre').value || 'Sin nombre';
});
renderMenu();
</script>
</body>
</html>
